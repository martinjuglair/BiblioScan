<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#8B5CF6" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>Ploom</title>
    <style>
      /* Inline splash screen — shows while JS bundle loads */
      #splash {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        background: linear-gradient(135deg, #8B5CF6 0%, #B065E0 50%, #F472B6 100%);
        transition: opacity 0.4s ease-out;
      }
      #splash.hide { opacity: 0; pointer-events: none; }
      #splash-logo {
        width: 88px; height: 88px;
        border-radius: 22px;
        overflow: hidden;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
        animation: splash-pulse 1.5s ease-in-out infinite;
      }
      #splash-logo img { width: 100%; height: 100%; display: block; }
      #splash-text {
        margin-top: 16px; font-family: 'Nunito', system-ui, sans-serif;
        font-size: 28px; font-weight: 800; color: #FFFFFF;
        letter-spacing: -0.02em;
      }
      #splash-sub {
        margin-top: 4px; font-family: 'Nunito', system-ui, sans-serif;
        font-size: 13px; color: rgba(255,255,255,0.7);
      }
      #splash-loader {
        margin-top: 32px;
        width: 24px; height: 24px;
        border: 2.5px solid rgba(255,255,255,0.25);
        border-top-color: rgba(255,255,255,0.8);
        border-radius: 50%;
        animation: splash-spin 0.8s linear infinite;
      }
      @keyframes splash-pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
      }
      @keyframes splash-spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body class="bg-surface-light text-text-primary min-h-screen">
    <!-- Splash screen -->
    <div id="splash">
      <div id="splash-logo">
        <img src="/ploom-logo.png" alt="Ploom" />
      </div>
      <div id="splash-text">Ploom</div>
      <div id="splash-sub">Votre bibliothèque de poche</div>
      <div id="splash-loader"></div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Hide splash when React mounts
      const observer = new MutationObserver(() => {
        const root = document.getElementById('root');
        if (root && root.children.length > 0) {
          const splash = document.getElementById('splash');
          if (splash) {
            splash.classList.add('hide');
            setTimeout(() => splash.remove(), 500);
          }
          observer.disconnect();
        }
      });
      observer.observe(document.getElementById('root'), { childList: true });
    </script>
  </body>
</html>
