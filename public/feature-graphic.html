<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Ploom — Feature Graphic</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1024px;
        height: 500px;
        overflow: hidden;
        font-family: "Manrope", -apple-system, system-ui, sans-serif;
      }
      .canvas {
        width: 1024px;
        height: 500px;
        position: relative;
        background:
          radial-gradient(circle at 18% 28%, #FFC83D 0%, transparent 55%),
          radial-gradient(circle at 82% 72%, #FF3C7A 0%, transparent 60%),
          linear-gradient(135deg, #FB6538 0%, #FF3C7A 60%, #FFC83D 100%);
        overflow: hidden;
      }

      /* Square Ploom app icon */
      .logo {
        position: absolute;
        top: 50px;
        left: 60px;
        width: 96px;
        height: 96px;
        border-radius: 22px;
        box-shadow: 0 12px 30px -6px rgba(26, 11, 24, 0.45);
        object-fit: cover;
      }

      /* Text block */
      .text {
        position: absolute;
        top: 175px;
        left: 60px;
        max-width: 460px;
      }
      .wordmark {
        font-size: 84px;
        font-weight: 800;
        color: #FFFFFF;
        letter-spacing: -3px;
        line-height: 0.95;
        margin-bottom: 14px;
        text-shadow: 0 4px 24px rgba(26, 11, 24, 0.18);
      }
      .tagline {
        font-size: 26px;
        font-weight: 700;
        color: #FFFFFF;
        letter-spacing: -0.5px;
        line-height: 1.15;
        margin-bottom: 18px;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 16px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.22);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1.5px solid rgba(255, 255, 255, 0.5);
        font-size: 13px;
        font-weight: 700;
        color: #FFF;
        letter-spacing: 0.4px;
      }
      .badge-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #FFF;
        box-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
      }

      /* Floating real book covers — dense "library coming alive" composition */
      .covers {
        position: absolute;
        right: 0;
        top: 0;
        width: 600px;
        height: 500px;
        pointer-events: none;
      }
      .cover {
        position: absolute;
        border-radius: 5px;
        overflow: hidden;
        box-shadow:
          0 18px 40px -12px rgba(26, 11, 24, 0.55),
          0 4px 8px rgba(26, 11, 24, 0.18);
        background: #1A0B18;
      }
      .cover img {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: cover;
      }
      /* Subtle highlight on top edge for "lit from above" */
      .cover::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, rgba(255,255,255,0.18) 0%, transparent 30%);
        pointer-events: none;
      }

      /* Hero Harry Potter — front-center, biggest */
      .c-hp {
        width: 170px;
        height: 255px;
        right: 200px;
        top: 100px;
        transform: rotate(-5deg);
        z-index: 9;
        box-shadow:
          0 30px 60px -15px rgba(26, 11, 24, 0.65),
          0 6px 12px rgba(26, 11, 24, 0.25);
      }
      /* Astérix — front-right, mid size */
      .c-as {
        width: 130px;
        height: 195px;
        right: 60px;
        top: 200px;
        transform: rotate(7deg);
        z-index: 8;
      }
      /* Death Note — back-left of HP, slight offset */
      .c-dn {
        width: 125px;
        height: 188px;
        right: 320px;
        top: 60px;
        transform: rotate(-13deg);
        z-index: 5;
      }
      /* L'Étranger — small, top-left of stack */
      .c-etr {
        width: 100px;
        height: 150px;
        right: 420px;
        top: 110px;
        transform: rotate(-18deg);
        z-index: 4;
      }
      /* Le Seigneur des Anneaux — between DN and HP */
      .c-sda {
        width: 105px;
        height: 158px;
        right: 290px;
        top: 230px;
        transform: rotate(4deg);
        z-index: 7;
      }
      /* One Piece — small, top-right */
      .c-op1 {
        width: 95px;
        height: 143px;
        right: 30px;
        top: 50px;
        transform: rotate(11deg);
        z-index: 6;
      }
      /* L'Alchimiste — bottom-left small */
      .c-alc {
        width: 90px;
        height: 135px;
        right: 410px;
        top: 320px;
        transform: rotate(-9deg);
        z-index: 5;
      }
      /* Le Petit Prince — bottom right small */
      .c-pp {
        width: 95px;
        height: 143px;
        right: 110px;
        top: 360px;
        transform: rotate(13deg);
        z-index: 7;
      }
      /* Tintin — back, between Astérix and DN */
      .c-tin {
        width: 105px;
        height: 158px;
        right: 170px;
        top: 360px;
        transform: rotate(-4deg);
        z-index: 6;
      }
    </style>
  </head>
  <body>
    <div class="canvas">
      <img class="logo" src="/icon-512.png" alt="Ploom" />

      <div class="text">
        <div class="wordmark">Ploom</div>
        <div class="tagline">Ton compagnon de lecture.</div>
        <div class="badge">
          <span class="badge-dot"></span>
          100% GRATUIT · ZÉRO PUB
        </div>
      </div>

      <div class="covers">
        <!-- Order matters for z-index stacking — back to front -->
        <div class="cover c-etr"><img src="/covers/etr.jpg" alt="" /></div>
        <div class="cover c-dn"><img src="/covers/dn.jpg" alt="" /></div>
        <div class="cover c-op1"><img src="/covers/op1.jpg" alt="" /></div>
        <div class="cover c-alc"><img src="/covers/alc.jpg" alt="" /></div>
        <div class="cover c-sda"><img src="/covers/sda.jpg" alt="" /></div>
        <div class="cover c-tin"><img src="/covers/tin.jpg" alt="" /></div>
        <div class="cover c-pp"><img src="/covers/pp.jpg" alt="" /></div>
        <div class="cover c-as"><img src="/covers/as.jpg" alt="" /></div>
        <div class="cover c-hp"><img src="/covers/hp.jpg" alt="" /></div>
      </div>
    </div>
  </body>
</html>
