<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Ploom — Feature Graphic</title>
    <style>
      /* System font stack — bypasses Google Fonts (which doesn't always
         load in time during headless screenshot, leading to a jarring
         fallback weight in the exported PNG). SF Pro Display on macOS
         and Roboto on Android both render the wordmark cleanly at the
         heavy weights we use below. */
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1024px;
        height: 500px;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", system-ui, sans-serif;
      }
      .canvas {
        width: 1024px;
        height: 500px;
        position: relative;
        background:
          radial-gradient(circle at 18% 28%, #FFC83D 0%, transparent 55%),
          radial-gradient(circle at 82% 72%, #FF3C7A 0%, transparent 60%),
          linear-gradient(135deg, #FB6538 0%, #FF3C7A 60%, #FFC83D 100%);
        overflow: hidden;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 22px;
      }

      .logo {
        width: 120px;
        height: 120px;
        border-radius: 28px;
        box-shadow: 0 18px 40px -10px rgba(26, 11, 24, 0.55),
                    0 4px 8px rgba(26, 11, 24, 0.18);
      }

      .wordmark {
        font-size: 96px;
        font-weight: 800;
        color: #FFFFFF;
        letter-spacing: -4px;
        line-height: 0.95;
        text-shadow: 0 4px 28px rgba(26, 11, 24, 0.22);
      }

      .tagline {
        font-size: 28px;
        font-weight: 700;
        color: #FFFFFF;
        letter-spacing: -0.5px;
        opacity: 0.95;
      }
    </style>
  </head>
  <body>
    <div class="canvas">
      <img class="logo" src="./icon-512.png" alt="Ploom" />
      <div class="wordmark">Ploom</div>
      <div class="tagline">Ton compagnon de lecture</div>
    </div>
  </body>
</html>
