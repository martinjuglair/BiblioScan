<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex">
<title>Télécharger Ploom</title>
<meta name="theme-color" content="#FB6538">

<!-- OG so when someone pastes ploom-app.com/app in a chat, the preview is the brand, not a blank page -->
<meta property="og:title" content="Télécharger Ploom">
<meta property="og:description" content="Ton compagnon de lecture. Disponible sur iOS et Android.">
<meta property="og:image" content="https://ploom-app.com/og-image.png">
<meta property="og:url" content="https://ploom-app.com/app">
<meta name="twitter:card" content="summary_large_image">

<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">

<style>
  :root {
    --grad: linear-gradient(135deg, #FB6538 0%, #FF3C7A 55%, #FFC83D 100%);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--grad);
    color: white;
    padding: 1.5rem;
    -webkit-font-smoothing: antialiased;
  }
  .card {
    text-align: center;
    max-width: 380px;
  }
  .logo {
    width: 88px;
    height: 88px;
    margin: 0 auto 1.5rem;
    border-radius: 22px;
    box-shadow: 0 14px 40px rgba(0, 0, 0, .25);
  }
  h1 {
    font-size: 1.6rem;
    margin: 0 0 .6rem;
    font-weight: 800;
    letter-spacing: -0.02em;
  }
  p {
    opacity: .92;
    margin: 0;
    font-size: .95rem;
    line-height: 1.5;
  }
  .spinner {
    width: 32px;
    height: 32px;
    margin: 1.5rem auto 0;
    border: 3px solid rgba(255,255,255,.35);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .fallback {
    margin-top: 2rem;
    display: none;
    flex-direction: column;
    gap: .75rem;
  }
  .fallback.show { display: flex; }
  .fallback a {
    background: white;
    color: #111;
    padding: .85rem 1.25rem;
    border-radius: 999px;
    text-decoration: none;
    font-weight: 700;
    font-size: .95rem;
    box-shadow: 0 6px 20px rgba(0, 0, 0, .15);
  }
  .fallback small {
    opacity: .8;
    font-size: .8rem;
    margin-top: .25rem;
  }
</style>
</head>
<body>
<div class="card">
  <img src="/ploom-logo.png" alt="Ploom" class="logo">
  <h1>On t'emmène au bon endroit…</h1>
  <p id="msg">Détection de ton appareil en cours.</p>
  <div class="spinner" id="spinner"></div>

  <!-- Shown only if the auto-redirect doesn't fire (very rare: scripts disabled,
       or the user lands here via a UA we can't classify). Lets them pick manually. -->
  <div class="fallback" id="fallback">
    <a id="appstore" href="https://apps.apple.com/app/id6766039341">Télécharger sur l'App Store</a>
    <a id="playstore" href="https://play.google.com/store/apps/details?id=com.ploom.app">Télécharger sur Google Play</a>
    <a href="/" style="background:transparent;color:white;box-shadow:none;text-decoration:underline;">
      Aller sur le site
    </a>
    <small>La redirection automatique n'a pas démarré.</small>
  </div>
</div>

<script>
(function() {
  var APP_STORE   = "https://apps.apple.com/app/id6766039341";
  var PLAY_STORE  = "https://play.google.com/store/apps/details?id=com.ploom.app";
  var LANDING     = "/";

  var ua = navigator.userAgent || navigator.vendor || "";

  // iOS: iPhone / iPad / iPod, plus iPadOS 13+ which reports as MacIntel
  // with touch — the only reliable way to detect modern iPad.
  var isIOS =
    /iPad|iPhone|iPod/.test(ua) ||
    (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);

  // Android phones + tablets
  var isAndroid = /Android/i.test(ua);

  // Pick destination. Default to the landing page for desktop browsers,
  // smart TVs, bots that won't redirect anyway, etc.
  var target;
  var label;
  if (isIOS)         { target = APP_STORE;  label = "Ouverture de l'App Store…"; }
  else if (isAndroid){ target = PLAY_STORE; label = "Ouverture de Google Play…"; }
  else               { target = LANDING;    label = "Redirection vers le site Ploom…"; }

  document.getElementById("msg").textContent = label;

  // Small delay so the user actually sees the brand splash for a fraction
  // of a second — prevents the "what was that flash?" feeling, and avoids
  // some pop-up blockers being suspicious of instant location changes.
  // location.replace() so the smart link doesn't pollute history.
  setTimeout(function() {
    try {
      window.location.replace(target);
    } catch (e) {
      window.location.href = target;
    }
  }, 250);

  // Safety net: if for any reason the redirect hasn't happened after 2.5s,
  // surface the manual buttons so the user isn't stuck on a blank page.
  setTimeout(function() {
    document.getElementById("spinner").style.display = "none";
    document.getElementById("fallback").classList.add("show");
  }, 2500);
})();
</script>
</body>
</html>
