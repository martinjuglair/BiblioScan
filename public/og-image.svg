<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background gradient: brand orange → pink → sun yellow, identical to the
       Ploom hero on the landing page and the splash screen of the mobile app. -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FB6538"/>
      <stop offset="50%" stop-color="#FF3C7A"/>
      <stop offset="100%" stop-color="#FFC83D"/>
    </linearGradient>

    <!-- Logo gradient — same purple→pink as the actual Ploom app icon. -->
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE7D6"/>
      <stop offset="100%" stop-color="#FFB996"/>
    </linearGradient>

    <!-- Soft shadow on the logo + cover stack. -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="6" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.18"/>
      <feComposite in2="offsetBlur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Full-bleed gradient background. -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative blurred circles (subtle, gives depth). -->
  <circle cx="1100" cy="-50" r="220" fill="#FFFFFF" fill-opacity="0.08"/>
  <circle cx="100" cy="700" r="280" fill="#FFFFFF" fill-opacity="0.06"/>

  <!-- ─── Left column: brand + tagline ─── -->
  <g transform="translate(80, 130)">
    <!-- Logo tile (rounded square, white-ish gradient like the app icon). -->
    <rect width="96" height="96" rx="22" fill="url(#logoGrad)" filter="url(#shadow)"/>
    <!-- Three "books" stacked silhouette inside the logo, mimicking the icon. -->
    <g transform="translate(20, 20)" fill="#FB6538">
      <rect x="0" y="38" width="56" height="18" rx="3"/>
      <rect x="4" y="20" width="48" height="18" rx="3" fill="#FF3C7A"/>
      <rect x="8" y="2"  width="40" height="18" rx="3" fill="#FFC83D"/>
    </g>

    <!-- Wordmark. -->
    <text x="0" y="200" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
          font-size="108" font-weight="900" fill="#FFFFFF" letter-spacing="-3">
      Ploom
    </text>

    <!-- Tagline. -->
    <text x="0" y="262" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
          font-size="38" font-weight="700" fill="#FFFFFF" fill-opacity="0.96" letter-spacing="-0.5">
      Ton compagnon de lecture.
    </text>

    <!-- Subline. -->
    <text x="0" y="312" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
          font-size="22" font-weight="500" fill="#FFFFFF" fill-opacity="0.9">
      Scanne, note, partage tous tes livres.
    </text>

    <!-- Pill: "100% Gratuit · Zéro pub". -->
    <g transform="translate(0, 360)">
      <rect width="380" height="52" rx="26" fill="#FFFFFF" fill-opacity="0.18"/>
      <text x="24" y="34" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
            font-size="20" font-weight="800" fill="#FFFFFF" letter-spacing="1">
        ✨  100% GRATUIT  ·  ZÉRO PUB
      </text>
    </g>
  </g>

  <!-- ─── Right column: stack of 3 book covers, slightly tilted, as a "preview" of a Ploom shelf ─── -->
  <g transform="translate(740, 110)" filter="url(#shadow)">
    <!-- Back cover. -->
    <g transform="rotate(-8, 130, 200)">
      <rect width="240" height="360" rx="14" fill="#1E1E1E"/>
      <rect x="20" y="26" width="200" height="12" rx="3" fill="#FFFFFF" fill-opacity="0.9"/>
      <rect x="20" y="48" width="160" height="8" rx="2" fill="#FFFFFF" fill-opacity="0.6"/>
      <!-- Imaginary cover art: bold abstract shapes. -->
      <circle cx="120" cy="180" r="60" fill="#FB6538"/>
      <rect x="58" y="240" width="124" height="80" rx="6" fill="#FFC83D"/>
    </g>

    <!-- Middle cover. -->
    <g transform="translate(80, 30)">
      <rect width="240" height="360" rx="14" fill="#FFFFFF"/>
      <rect x="20" y="26" width="200" height="14" rx="3" fill="#1E1E1E"/>
      <rect x="20" y="50" width="140" height="10" rx="2" fill="#999999"/>
      <!-- Imaginary cover art. -->
      <rect x="20" y="86" width="200" height="240" rx="8" fill="#F5EADE"/>
      <text x="120" y="220" font-family="Georgia, serif" font-size="44" font-weight="900"
            fill="#FB6538" text-anchor="middle">Ploom</text>
      <text x="120" y="260" font-family="Georgia, serif" font-size="18" font-style="italic"
            fill="#666666" text-anchor="middle">Ta bibliothèque</text>
    </g>

    <!-- Front cover (top). -->
    <g transform="translate(160, 60) rotate(6, 120, 180)">
      <rect width="240" height="360" rx="14" fill="#8B5CF6"/>
      <rect x="20" y="26" width="200" height="12" rx="3" fill="#FFFFFF" fill-opacity="0.9"/>
      <rect x="20" y="48" width="120" height="8" rx="2" fill="#FFFFFF" fill-opacity="0.55"/>
      <!-- Star rating (5/5). -->
      <g transform="translate(20, 320)" fill="#FFD23F">
        <text font-family="Helvetica, Arial, sans-serif" font-size="22">★ ★ ★ ★ ★</text>
      </g>
      <!-- Imaginary cover art. -->
      <circle cx="120" cy="170" r="70" fill="#FFC83D" fill-opacity="0.95"/>
      <circle cx="155" cy="155" r="34" fill="#FB6538"/>
    </g>
  </g>

  <!-- Bottom-right URL (subtle). -->
  <text x="1140" y="600" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
        font-size="20" font-weight="700" fill="#FFFFFF" fill-opacity="0.85" text-anchor="end" letter-spacing="0.5">
    ploom-app.com
  </text>
</svg>
